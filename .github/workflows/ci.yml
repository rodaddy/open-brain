name: CI

on:
  push:
    branches: ["wip/**", "feat/**", "fix/**", main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_core01:
        description: "Deploy Open Brain to core01 after validation passes"
        required: true
        type: boolean
        default: false

env:
  BUN_VERSION: "1.3.13"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  check:
    runs-on: [self-hosted, Linux, rodaddy]
    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USER: test
      DB_PASSWORD: test
      DB_NAME: open_brain_test
      # Enable the env-gated real-Pool integration tests in CI (issue #165).
      # Without this, every `dbDescribe`-gated suite (lane_upsert, the #161
      # cursor-stall promoter tests) silently SKIPs and the SQL write paths get
      # zero CI coverage — the exact gap that let the #162 lane_upsert bugs ship.
      OPENBRAIN_TEST_DATABASE_URL: postgres://test:test@localhost:5432/open_brain_test
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bunx tsc --noEmit

      - name: Run migrations
        run: bun run migrate

      - name: Test
        run: bun test

  python-package:
    runs-on: [self-hosted, Linux, rodaddy]
    defaults:
      run:
        working-directory: python/openbrain-memory
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.2.0

      - name: Lint python package
        env:
          TMPDIR: ${{ runner.temp }}
        run: uv run ruff check src tests

      - name: Typecheck python package
        env:
          TMPDIR: ${{ runner.temp }}
        run: uv run mypy src/openbrain_memory

      - name: Test python package
        env:
          TMPDIR: ${{ runner.temp }}
        run: uv run pytest -q

      - name: Build python package
        env:
          TMPDIR: ${{ runner.temp }}
        run: uv build

  deploy:
    needs: [check, python-package]
    runs-on: [self-hosted, macOS, core01]
    if: |
      (github.event_name == 'workflow_dispatch' && inputs.deploy_core01) ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
    concurrency:
      group: deploy-core01-production
      cancel-in-progress: false
    env:
      RUNTIME_DIR: /Volumes/ThunderBolt/open-brain/app

    steps:
      - uses: actions/checkout@v6

      - name: Deploy to core01 launchd runtime
        run: /opt/homebrew/bin/bash scripts/core01-deploy-local.sh
